const { useState, useEffect, useMemo, useCallback } = React;

/* =========================================================================
THE CROAK'N'T PLAN — Liam's full daily system
Self-care routine + training plan, scheduled & tracked by day.
Tabs: Today · Train · Progress · Plan

const _mem = {};
async function sget(k) { try { const v = localStorage.getItem(k); return v == null ? (k in _mem ? _mem[k] : null) : v; } catch (e) {} return k in _mem ? _mem[k] : null; }
async function sset(k, v) { _mem[k] = v; try { localStorage.setItem(k, v); } catch (e) {} }

const dayMs = 86400000;
const keyOf = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
const addDays = (d, n) => { const x = new Date(d); x.setDate(d.getDate() + n); return x; };
const dnum = (d) => Math.floor(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) / dayMs);
const EPOCH_N = dnum(new Date(2024, 0, 7)); // a Sunday
const weekParity = (d) => { const sow = addDays(d, -d.getDay()); return ((Math.floor((dnum(sow) - EPOCH_N) / 7) % 2) + 2) % 2; };
const legsToken = (d) => (weekParity(d) === 0 ? "legs1" : "legs2");
const absIndex = (d) => (((dnum(d) - EPOCH_N) % 3) + 3) % 3;

const C = { bg: "#EEF1E9", surf: "#FBFCF8", ink: "#222D24", green: "#3A6B4E", greenSoft: "rgba(58,107,78,0.09)", clay: "#C26B3F", sand: "#E4B96B", moss: "#6B8F5E", line: "rgba(34,45,36,0.09)", blue: "#3F7390" };

// ---- SELF-CARE ROUTINE ----

  shampoo: { name: "Shampoo", dose: "", when: "In the shower", note: "", glyph: "shampoo", slot: "shower" },
  "minoxidil-pm": { name: "Rogaine — Minoxidil 5%", dose: "1 mL / half a foam cap", when: "Dry scalp, 2nd dose", note: "≥4 hrs after the AM dose. Dry scalp first.", glyph: "drop", slot: "evening" },
};

// ---- DAILY HABITS ----
const HABITS = [

// ---- WORKOUTS (with sets/reps) ----
const E = (n, s) => ({ n, s });
const WORKOUTS = [
  { id: "push", name: "Push", tag: "Strength", accent: C.green, blocks: [
    { h: "Chest", ex: [E("Dumbbell Bench Press", "4 × 8–10"), E("Cable Flys (normal)", "3 × 12–15"), E("Dumbbell Pull-over", "3 × 12"), E("Cable Flys (low → high)", "3 × 12–15")] },
    { h: "Shoulders", ex: [E("Seated Dumbbell Press", "3 × 8–12"), E("I–T–Y Triset", "3 × 10 each"), E("Rear Delt Flys", "3 × 15"), E("Upright Rows", "3 × 12")] },
    { h: "Triceps", ex: [E("Tricep Extensions", "3 × 12"), E("Skull Crushers", "3 × 10–12"), E("Tricep Dips", "3 × AMRAP"), E("Tricep Pushdowns", "3 × 12–15")] },
  ]},

    { h: "Back", ex: [E("Landmine Rows", "4 × 8–10"), E("Pull-ups (banded)", "3 × AMRAP"), E("Lat Pulldowns", "3 × 10–12")] },
    { h: "Biceps", ex: [E("V-Curls", "3 × 10–12"), E("Hammer Curls", "3 × 10–12"), E("Concentrated Curls", "3 × 12")] },
    { h: "Forearms", ex: [E("Reverse Curls", "3 × 12–15"), E("Twists", "3 × 15"), E("Wrist Curls", "3 × 15–20"), E("Internal / External Rotations", "2–3 × 15")] },

  ]},

    { h: "Session", ex: [E("Jump Rope", "3–5 × 60s"), E("Sled Drives — full sprints", "6–8 × 5–10s"), E("Box Jumps", "5 × 5"), E("Reverse Lunge Knee Drives", "3 × 10 /leg")] },

  ]},
];
const WBYID = Object.fromEntries(WORKOUTS.map((w) => [w.id, w]));
const parseSets = (s) => { if (!s.includes("×")) return 1; const m = s.split("×")[0].match(/\d+/); return m ? parseInt(m[0], 10) : 1; };
const isDuration = (s) => !s.includes("×");
const repsOf = (s) => (s.includes("×") ? s.split("×")[1].trim() : s);

  E("Butterfly Stretch", "60s"),
  E("Doorway Chest Stretch", "30s /side"),
  E("Neck Stretch", "30s /side"),
] };

// schedule tokens
const SESSIONS = { push: "Push", pull: "Pull", legs: "Legs (alternates)", cardio: "Cardio / Plyo", full: "Whole Body", rest: "Rest" };
const CYCLE = ["push", "pull", "legs", "cardio", "full", "rest"];

// ---- DIET ----
const FOODS = ["White pizza", "Buttered pasta with Parmesan", "Cheese quesadilla", "French fries with ketchup", "Grilled cheese", "Egg whites on toasted baguette", "Cheese omelet", "Mac and cheese", "Scrambled eggs", "Toast"];
const PROTEIN_NOW = ["Protein powder", "Whole eggs", "Egg whites", "Cheese & dairy"];
const PROTEIN_EASY = [
  ["Protein powder — your easiest win", "A scoop or two in milk or water covers a big chunk of your daily protein with zero new foods. Blend into oats or a shake."],
  ["Cottage cheese", "Stir into pasta or eggs — melts in, barely changes the taste."],
  ["Greek yogurt", "~15–20g a cup. A little honey if plain's too tangy."],
  ["Ricotta", "Folds into your buttered pasta or onto toast. Mild and creamy."],
  ["Extra egg in the quesadilla / mac", "Scramble one right into dishes you already eat."],
];
const PROTEIN_LATER = [["Rotisserie chicken", "Shred a little into quesadillas or mac."], ["Deli turkey", "Slip a slice into the grilled cheese."], ["Canned tuna", "Mild, mixes into pasta or melts."]];

const SUPPLY_DEFAULTS = { protein: { name: "Whey Protein Powder", weeks: 8 }, creatine: { name: "Micronized Creatine", weeks: 16 }, minoxidil: { name: "Rogaine (3-pack)", weeks: 12 }, nizoral: { name: "Nizoral Shampoo", weeks: 16 }, native: { name: "Native Shampoo", weeks: 10 }, cerave: { name: "CeraVe AM Lotion", weeks: 12 }, multivitamin: { name: "One A Day Multi", weeks: 14 } };

const DEFAULT_SETTINGS = {
  name: "Liam", startWeight: 207, nizoralDays: [1, 3, 5],
  schedule: { 0: "rest", 1: "push", 2: "cardio", 3: "pull", 4: "rest", 5: "legs", 6: "full" },
  enabled: Object.fromEntries(ROUTINE_IDS.map((k) => [k, true])),

// ---- UI atoms ----
const Frog = ({ s = 26, c = C.green }) => (
  <svg width={s} height={s} viewBox="0 0 32 32" fill="none"><circle cx="16" cy="19" r="9" fill={c} /><circle cx="9.5" cy="9.5" r="4.5" fill={c} /><circle cx="22.5" cy="9.5" r="4.5" fill={c} /><circle cx="9.5" cy="9" r="2" fill="#fff" /><circle cx="22.5" cy="9" r="2" fill="#fff" /><circle cx="9.8" cy="9.2" r="1" fill={C.ink} /><circle cx="22.2" cy="9.2" r="1" fill={C.ink} /><path d="M11 21q5 4 10 0" stroke="#fff" strokeWidth="1.6" strokeLinecap="round" fill="none" /></svg>
);
const Glyph = ({ type, c = "currentColor" }) => {
  const p = { width: 21, height: 21, fill: "none", stroke: c, strokeWidth: 1.6, strokeLinecap: "round", strokeLinejoin: "round" };
  const g = { drop: <path d="M12 3s6 6.5 6 11a6 6 0 0 1-12 0c0-4.5 6-11 6-11Z" />, sun: <><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19" /></>, scoop: <><path d="M5 9h14l-1.2 9.2a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8L5 9Z" /><path d="M4 9c0-2.2 3.6-4 8-4s8 1.8 8 4" /></>, vit: <><rect x="4" y="9" width="16" height="9" rx="4.5" /><path d="M12 9v9" /></>, shampoo: <><path d="M9 8h6v11a2 2 0 0 1-2 2h-2a2 2 0 0 1-2-2V8Z" /><path d="M10 8V5h4v3M10 5V3h4" /></> };
  return <svg viewBox="0 0 24 24" {...p}>{g[type]}</svg>;
};
const Ring = ({ pct, size = 74 }) => { const r = size / 2 - 8, c = 2 * Math.PI * r; return (<svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}><circle cx={size / 2} cy={size / 2} r={r} stroke="rgba(58,107,78,0.16)" strokeWidth="7" fill="none" /><circle cx={size / 2} cy={size / 2} r={r} stroke={C.green} strokeWidth="7" fill="none" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={c - (c * pct) / 100} transform={`rotate(-90 ${size / 2} ${size / 2})`} style={{ transition: "stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)" }} /><text x="50%" y="54%" textAnchor="middle" fontSize={size / 4} fontWeight="700" fill={C.ink} fontFamily="'DM Sans',sans-serif">{pct}%</text></svg>); };
const Flame = ({ s = 18 }) => <svg width={s} height={s} viewBox="0 0 24 24" fill={C.clay}><path d="M12 2c1 3-2 4-2 7 0 1.5 1 2.5 2 2.5S15 12 14 9c3 1.5 5 4.2 5 7a7 7 0 0 1-14 0c0-3.4 2.5-5.6 4-7.5C10.5 6.7 11.5 4.5 12 2Z" /></svg>;
const Check = ({ on, size = 26 }) => (<span style={{ flexShrink: 0, width: size, height: size, borderRadius: 999, display: "flex", alignItems: "center", justifyContent: "center", border: `2px solid ${on ? C.green : "rgba(34,45,36,0.22)"}`, background: on ? C.green : "transparent", animation: on ? "pop .3s" : "none" }}>{on && <svg width={size * 0.54} height={size * 0.54} viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m5 12 5 5L20 6" /></svg>}</span>);
const ExRow = ({ ex, accent }) => (<div style={{ display: "flex", alignItems: "center", gap: 9, padding: "7px 0", borderBottom: `1px solid ${C.line}` }}><span style={{ width: 5, height: 5, borderRadius: 999, background: "rgba(34,45,36,0.3)", flexShrink: 0 }} /><span style={{ flex: 1, fontSize: 14, color: C.ink }}>{ex.n}</span><span style={{ fontSize: 12.5, fontWeight: 700, color: accent, whiteSpace: "nowrap" }}>{ex.s}</span></div>);

// =========================================================================
function App() {
  const [tab, setTab] = useState("today");
  const [now, setNow] = useState(new Date());
  const [viewDate, setViewDate] = useState(new Date());
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [days, setDays] = useState({});
  const [weights, setWeights] = useState([]);
  const [calories, setCalories] = useState([]);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    (async () => {
      const s = await sget("cp:settings"); const d = await sget("cp:days"); const w = await sget("cp:weights"); const c = await sget("cp:calories");
      if (s) try { const ps = JSON.parse(s); setSettings({ ...DEFAULT_SETTINGS, ...ps, schedule: { ...DEFAULT_SETTINGS.schedule, ...(ps.schedule || {}) }, enabled: { ...DEFAULT_SETTINGS.enabled, ...(ps.enabled || {}) }, supplies: { ...DEFAULT_SETTINGS.supplies, ...(ps.supplies || {}) } }); } catch (e) {}
      if (d) try { setDays(JSON.parse(d)); } catch (e) {}
      if (w) try { setWeights(JSON.parse(w)); } catch (e) {}
      if (c) try { setCalories(JSON.parse(c)); } catch (e) {}
      setReady(true);
    })();
    const t = setInterval(() => setNow(new Date()), 60000); return () => clearInterval(t);
  }, []);

  const saveSettings = useCallback((n) => { setSettings(n); sset("cp:settings", JSON.stringify(n)); }, []);
  const saveDays = useCallback((n) => { setDays(n); sset("cp:days", JSON.stringify(n)); }, []);
  const saveWeights = useCallback((n) => { setWeights(n); sset("cp:weights", JSON.stringify(n)); }, []);
  const saveCalories = useCallback((n) => { setCalories(n); sset("cp:calories", JSON.stringify(n)); }, []);

  const tk = keyOf(viewDate);
  const today = days[tk] || { routine: {}, habits: {}, water: 0, workouts: [], sets: {} };
  const setToday = (patch) => saveDays({ ...days, [tk]: { routine: {}, habits: {}, water: 0, workouts: [], sets: {}, ...today, ...patch } });
  const toggleRoutine = (id) => setToday({ routine: { ...today.routine, [id]: !today.routine[id] } });
  const toggleHabit = (id) => setToday({ habits: { ...today.habits, [id]: !today.habits[id] } });
  const setWater = (n) => setToday({ water: Math.max(0, Math.min(WATER_GOAL + 4, n)) });
  const logWorkout = (id) => { const has = today.workouts.includes(id); setToday({ workouts: has ? today.workouts.filter((x) => x !== id) : [...today.workouts, id] }); };

  const isNizoral = (d) => settings.nizoralDays.includes(d.getDay());

  const dayComplete = useCallback((dd) => { const rec = days[keyOf(dd)]; if (!rec) return false; return HABITS.every((h) => rec.habits?.[h.id]) && rec.habits?.abs && (rec.water || 0) >= WATER_GOAL; }, [days]);
  const streak = useMemo(() => { let n = 0, p = new Date(now); if (!dayComplete(p)) p = addDays(p, -1); while (dayComplete(p)) { n++; p = addDays(p, -1); } return n; }, [days, now, dayComplete]);
  const workoutsThisWeek = useMemo(() => { let c = 0; const sun = addDays(now, -now.getDay()); for (let i = 0; i < 7; i++) if (days[keyOf(addDays(sun, i))]?.workouts?.length) c++; return c; }, [days, now]);

  if (!ready) return <div style={{ minHeight: "100vh", background: C.bg }} />;
  const ctx = { now, viewDate, setViewDate, settings, saveSettings, days, saveDays, weights, saveWeights, calories, saveCalories, today, setToday, toggleRoutine, toggleHabit, setWater, logWorkout, isNizoral, streak, workoutsThisWeek, dayComplete };

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: "'DM Sans',sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600;700&display=swap');@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}@keyframes pop{0%{transform:scale(.8)}60%{transform:scale(1.08)}100%{transform:scale(1)}}.fu{animation:fadeUp .5s both}*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}input,button{font-family:inherit}`}</style>
      <div style={{ maxWidth: 460, margin: "0 auto", padding: "0 16px 112px" }}>
        {tab === "today" && <Today {...ctx} />}
        {tab === "train" && <Train {...ctx} />}
        {tab === "progress" && <Progress {...ctx} />}
        {tab === "plan" && <Plan {...ctx} />}
      </div>
      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(251,252,248,0.93)", backdropFilter: "blur(12px)", borderTop: `1px solid ${C.line}` }}>
        <div style={{ maxWidth: 460, margin: "0 auto", display: "flex" }}>
          {[["today", "Today", "M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"], ["train", "Train", "M6.5 6.5l11 11M4 9l2-2 2 2-2 2zm14 14l2-2-2-2-2 2zM9 15l6-6"], ["progress", "Progress", "M4 19V5m0 14h16M8 16l3-4 3 2 4-6"], ["plan", "Plan", "M5 6h14M5 12h14M5 18h9"]].map(([id, label, d]) => (
            <button key={id} onClick={() => setTab(id)} style={{ flex: 1, padding: "11px 0 16px", background: "none", border: "none", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, color: tab === id ? C.green : "rgba(34,45,36,0.4)" }}>
              <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={tab === id ? 2.1 : 1.7} strokeLinecap="round" strokeLinejoin="round"><path d={d} /></svg>
              <span style={{ fontSize: 11, fontWeight: tab === id ? 700 : 500 }}>{label}</span>
            </button>))}
        </div>
      </nav>
    </div>
  );
}

// =========================== TODAY ===========================
function Today({ now, viewDate, setViewDate, settings, today, toggleRoutine, toggleHabit, setToday, setWater, logWorkout, isNizoral, streak, workoutsThisWeek, calories, saveCalories }) {
  const [calInput, setCalInput] = useState("");
  const viewedCal = calories.find((c) => c.date === keyOf(viewDate))?.kcal;
  const logCal = () => {
    const n = parseInt(calInput, 10);
    if (!n || n < 0 || n > 20000) return;
    const dk = keyOf(viewDate);
    saveCalories([...calories.filter((c) => c.date !== dk), { date: dk, kcal: n }].sort((a, b) => a.date.localeCompare(b.date)));
    setCalInput("");
  };
  const clearCal = () => { const dk = keyOf(viewDate); saveCalories(calories.filter((c) => c.date !== dk)); };
  const greeting = now.getHours() < 12 ? "Good morning" : now.getHours() < 18 ? "Good afternoon" : "Good evening";
  const isToday = keyOf(viewDate) === keyOf(now);
  const dayDiff = dnum(viewDate) - dnum(now);
  const relLabel = dayDiff === 0 ? "Today" : dayDiff === 1 ? "Tomorrow" : dayDiff === -1 ? "Yesterday" : dayDiff > 0 ? `In ${dayDiff} days` : `${Math.abs(dayDiff)} days ago`;
  const dateLabel = viewDate.toLocaleDateString("en-US", { weekday: "long", month: "short", day: "numeric" });
  const nizToday = isNizoral(viewDate);

  // scheduled session for the viewed day (resolve legs alternation)
  const token = settings.schedule[viewDate.getDay()] || "rest";
  const resolved = token === "legs" ? legsToken(viewDate) : token;
  const sessionW = WBYID[resolved];
  const sessionKeys = sessionW ? sessionW.blocks.flatMap((b) => b.ex.map((e) => ({ key: resolved + "|" + e.n, t: parseSets(e.s) }))) : [];
  const totalSets = sessionKeys.reduce((a, x) => a + x.t, 0);
  const doneSets = sessionKeys.reduce((a, x) => a + Math.min(today.sets?.[x.key] || 0, x.t), 0);
  const sessionComplete = totalSets > 0 && doneSets >= totalSets;
  const sessionLogged = (today.workouts || []).includes(resolved);
  const toggleSet = (key, n, sid) => {
    const v = Math.max(0, n);
    const nextSets = { ...(today.sets || {}), [key]: v };
    const dn = sessionKeys.reduce((a, x) => a + Math.min(x.key === key ? v : (nextSets[x.key] || 0), x.t), 0);
    let workouts = today.workouts || [];
    if (totalSets > 0 && dn >= totalSets && !workouts.includes(sid)) workouts = [...workouts, sid];
    setToday({ sets: nextSets, workouts });
  };

  // abs circuit for the viewed day
  const circuit = AB_CIRCUITS[absIndex(viewDate)];
  const absDone = !!today.habits.abs;

  const activeRoutine = ROUTINE_IDS.filter((id) => settings.enabled[id] !== false);
  const rDone = activeRoutine.filter((id) => today.routine[id]).length;
  const hDone = HABITS.filter((h) => today.habits[h.id]).length + (absDone ? 1 : 0);
  const wDone = today.water >= WATER_GOAL ? 1 : 0;
  const total = activeRoutine.length + HABITS.length + 1 + 1; // routine + habits + abs + water
  const done = rDone + hDone + wDone;
  const pct = Math.round((done / total) * 100);

  const showerMeta = nizToday ? { name: "Nizoral Anti-Dandruff Shampoo", dose: "Lather, wait 3–5 min, rinse", note: "The soak treats the flaking. 3×/week is plenty." } : { name: "Native Moisturizing Shampoo", dose: "Normal wash", note: "Everyday shampoo for non-Nizoral days." };
  const week = [...Array(7)].map((_, i) => ({ l: ["S", "M", "T", "W", "T", "F", "S"][i], niz: settings.nizoralDays.includes(i), today: i === viewDate.getDay() }));

  return (
    <>
      <header className="fu" style={{ paddingTop: 40, paddingBottom: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}><Frog s={22} /><p style={{ fontSize: 12.5, fontWeight: 700, color: C.green, letterSpacing: ".08em" }}>THE CROAK'N'T PLAN</p></div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, marginTop: 10 }}>
          <div>
            <h1 style={{ fontFamily: "'Fraunces',serif", fontSize: 29, lineHeight: 1.05, fontWeight: 600, color: C.ink }}>{greeting},<br />{settings.name}</h1>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 10 }}>{streak > 0 && <span style={{ display: "inline-flex", alignItems: "center", gap: 4, background: "rgba(194,107,63,0.13)", color: C.clay, fontWeight: 700, fontSize: 12.5, padding: "3px 9px", borderRadius: 999 }}><Flame s={13} />{streak}-day streak</span>}<span style={{ fontSize: 13, fontWeight: 500, color: "rgba(34,45,36,0.55)" }}>{done}/{total} done</span></div>
          </div>
          <Ring pct={pct} />
        </div>
      </header>

      {/* ===== DATE NAVIGATOR ===== */}
      <div className="fu" style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 18, background: isToday ? C.surf : "rgba(63,115,144,0.08)", border: `1px solid ${isToday ? C.line : "rgba(63,115,144,0.28)"}`, borderRadius: 14, padding: "8px 10px" }}>
        <button onClick={() => setViewDate(addDays(viewDate, -1))} aria-label="Previous day" style={{ width: 34, height: 34, borderRadius: 10, border: "none", background: "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: C.ink }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6" /></svg>
        </button>
        <div style={{ flex: 1, textAlign: "center", lineHeight: 1.1 }}>
          <div style={{ fontSize: 10.5, fontWeight: 700, letterSpacing: ".08em", color: isToday ? C.green : C.blue, textTransform: "uppercase" }}>{relLabel}</div>
          <div style={{ fontSize: 13.5, fontWeight: 600, color: C.ink, marginTop: 2 }}>{dateLabel}</div>
        </div>
        <button onClick={() => setViewDate(addDays(viewDate, 1))} aria-label="Next day" style={{ width: 34, height: 34, borderRadius: 10, border: "none", background: "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", color: C.ink }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6" /></svg>
        </button>
        {!isToday && (
          <button onClick={() => setViewDate(new Date())} style={{ marginLeft: 2, padding: "6px 11px", borderRadius: 999, border: "none", background: C.green, color: "#fff", fontWeight: 700, fontSize: 11.5, cursor: "pointer" }}>Today</button>
        )}
      </div>

      {/* ===== MORNING ===== */}
      <SectionTitle>Morning routine</SectionTitle>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 22 }}>
        {["multivitamin", "creatine", "cerave"].filter((id) => settings.enabled[id] !== false).map((id) => (
          <RowCard key={id} meta={ROUTINE[id]} checked={!!today.routine[id]} onClick={() => toggleRoutine(id)} accent={C.green} />
        ))}
      </div>

      {/* ===== SHOWER (morning) ===== */}
      {settings.enabled.shampoo !== false && (<>
        <SectionTitle>Shower</SectionTitle>
        <div style={{ marginBottom: 6 }}><RowCard meta={{ ...ROUTINE.shampoo, ...showerMeta }} checked={!!today.routine.shampoo} onClick={() => toggleRoutine("shampoo")} accent={C.blue} /></div>
        <div className="fu" style={{ display: "flex", gap: 6, marginBottom: 6 }}>{week.map((d, k) => (<div key={k} style={{ flex: 1, borderRadius: 11, padding: "6px 0", textAlign: "center", background: d.today ? C.green : C.surf, border: `1px solid ${d.today ? C.green : C.line}` }}><div style={{ fontSize: 11.5, fontWeight: 700, color: d.today ? "#fff" : "rgba(34,45,36,0.7)" }}>{d.l}</div><div style={{ width: 5, height: 5, borderRadius: 999, margin: "5px auto 0", background: d.niz ? (d.today ? C.sand : C.clay) : "transparent" }} /></div>))}</div>
        <p style={{ fontSize: 11, color: "rgba(34,45,36,0.45)", margin: "0 0 14px 4px", display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 5, height: 5, borderRadius: 999, background: C.clay }} /> Nizoral days · set on the Plan tab</p>
      </>)}

      {/* minoxidil goes on a dry scalp, after the shower */}
      {settings.enabled["minoxidil-am"] !== false && (
        <div style={{ marginBottom: 22 }}><RowCard meta={ROUTINE["minoxidil-am"]} checked={!!today.routine["minoxidil-am"]} onClick={() => toggleRoutine("minoxidil-am")} accent={C.green} /></div>
      )}

      <StretchCard data={STRETCH_AM} done={!!today.habits.stretchAM} onToggle={() => toggleHabit("stretchAM")} />

      {/* ===== TRAINING ===== */}
      {/* session checklist — tap the box to finish a move, or tick sets one at a time */}
      <SectionTitle>{isToday ? "Today's session" : `${viewDate.toLocaleDateString("en-US", { weekday: "long" })}'s session`}</SectionTitle>
      {sessionW ? (
        <div className="fu" style={{ background: C.surf, border: `1px solid ${sessionComplete ? "rgba(58,107,78,0.35)" : C.line}`, borderRadius: 18, padding: "15px 16px", marginBottom: 22 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 9 }}>
            <span style={{ width: 10, height: 10, borderRadius: 999, background: sessionW.accent, flexShrink: 0 }} />
            <span style={{ flex: 1, fontSize: 16, fontWeight: 700, color: C.ink }}>{sessionW.name}</span>
            <span style={{ fontSize: 12.5, fontWeight: 700, color: sessionComplete ? C.green : "rgba(34,45,36,0.5)" }}>{sessionComplete ? "Done ✓" : `${doneSets} / ${totalSets} sets`}</span>
          </div>
          <div style={{ height: 6, borderRadius: 999, background: "rgba(34,45,36,0.08)", overflow: "hidden", marginBottom: 4 }}>
            <div style={{ width: `${totalSets ? (doneSets / totalSets) * 100 : 0}%`, height: "100%", background: sessionW.accent, borderRadius: 999, transition: ".4s" }} />
          </div>
          {sessionW.blocks.map((b) => (
            <div key={b.h} style={{ marginTop: 14 }}>
              <p style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: sessionW.accent, marginBottom: 4 }}>{b.h}</p>
              {b.ex.map((e) => {
                const key = resolved + "|" + e.n;
                const target = parseSets(e.s);
                const dur = isDuration(e.s);
                const dn = today.sets?.[key] || 0;
                const cpl = dn >= target;
                const reps = repsOf(e.s);
                return (
                  <div key={e.n} style={{ display: "flex", alignItems: "center", gap: 11, padding: "11px 0", borderBottom: `1px solid ${C.line}` }}>
                    {/* checkbox — one tap finishes / clears the whole move */}
                    <button onClick={() => toggleSet(key, cpl ? 0 : target, resolved)} aria-label={cpl ? "Mark unfinished" : "Mark finished"} style={{ background: "none", border: "none", padding: 0, cursor: "pointer" }}>
                      <Check on={cpl} size={24} />
                    </button>
                    {/* name + target */}
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <span style={{ display: "block", fontSize: 14.5, fontWeight: 600, color: cpl ? "rgba(34,45,36,0.42)" : C.ink, textDecoration: cpl ? "line-through" : "none" }}>{e.n}</span>
                      <span style={{ display: "block", fontSize: 12, color: "rgba(34,45,36,0.5)", marginTop: 1 }}>{dur ? reps : `${target} sets · ${reps} reps`}</span>
                    </div>
                    {/* set dots — tap to count one set at a time (hidden for timed moves) */}
                    {!dur && (
                      <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                        {Array.from({ length: target }).map((_, i) => {
                          const filled = i < dn;
                          return (
                            <button key={i} onClick={() => toggleSet(key, dn === i + 1 ? i : i + 1, resolved)} aria-label={`Set ${i + 1}`} style={{ width: 19, height: 19, borderRadius: 999, padding: 0, cursor: "pointer", border: `1.5px solid ${filled ? sessionW.accent : "rgba(34,45,36,0.22)"}`, background: filled ? sessionW.accent : "transparent", transition: ".15s" }} />
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))}
          <button onClick={() => logWorkout(resolved)} style={{ width: "100%", marginTop: 15, padding: 11, borderRadius: 12, border: `1px solid ${C.line}`, cursor: "pointer", fontSize: 13.5, fontWeight: 700, background: "transparent", color: sessionLogged ? C.green : "rgba(34,45,36,0.6)" }}>{sessionLogged ? "Logged ✓ — tap to unlog" : "Or mark the whole session done"}</button>
        </div>
      ) : (
        <div className="fu" style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 18, padding: "16px 18px", marginBottom: 22 }}><p style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>Rest day</p><p style={{ fontSize: 13, color: "rgba(34,45,36,0.55)", marginTop: 3, lineHeight: 1.45 }}>Recovery is where the work pays off. Abs and stretching still count today — keep them going.</p></div>
      )}

      {/* abs detail */}
      <SectionTitle>{isToday ? "Abs — today" : "Abs"}</SectionTitle>
      <div className="fu" style={{ background: absDone ? C.greenSoft : C.surf, border: `1px solid ${absDone ? "rgba(58,107,78,0.28)" : C.line}`, borderRadius: 18, padding: "15px 16px", marginBottom: 22 }}>
        <button onClick={() => toggleHabit("abs")} style={{ width: "100%", textAlign: "left", display: "flex", alignItems: "center", gap: 12, background: "none", border: "none", cursor: "pointer", padding: 0, marginBottom: 12 }}>
          <Check on={absDone} />
          <span style={{ flex: 1 }}><span style={{ display: "block", fontSize: 15.5, fontWeight: 700, color: C.ink }}>Abs · {circuit.h}</span><span style={{ fontSize: 12, color: "rgba(34,45,36,0.5)" }}>Rotates daily · 3 rounds through</span></span>
        </button>
        {circuit.ex.map((e) => <ExRow key={e.n} ex={e} accent={C.clay} />)}
        <ExRow ex={PLANK} accent={C.clay} />
      </div>

      {/* ===== THROUGH THE DAY ===== */}
      <SectionTitle>Through the day</SectionTitle>
      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>{HABITS.filter((h) => h.id === "salad" || h.id === "noSugar").map((h) => { const on = !!today.habits[h.id]; return (<button key={h.id} onClick={() => toggleHabit(h.id)} style={{ textAlign: "left", width: "100%", display: "flex", alignItems: "center", gap: 12, borderRadius: 15, padding: "12px 15px", cursor: "pointer", background: on ? C.greenSoft : C.surf, border: `1px solid ${on ? "rgba(58,107,78,0.28)" : C.line}` }}><Check on={on} /><span style={{ flex: 1 }}><span style={{ display: "block", fontSize: 14.5, fontWeight: 600, color: on ? "rgba(34,45,36,0.5)" : C.ink, textDecoration: on ? "line-through" : "none" }}>{h.label}</span>{h.sub && <span style={{ fontSize: 12, color: "rgba(34,45,36,0.45)" }}>{h.sub}</span>}</span></button>); })}</div>

      {/* water */}
      <div style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 15, padding: "14px 16px", marginBottom: 10 }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 11 }}><span style={{ fontSize: 14.5, fontWeight: 600, color: C.ink }}>Water</span><span style={{ fontSize: 13, fontWeight: 700, color: today.water >= WATER_GOAL ? C.blue : "rgba(34,45,36,0.5)" }}>{today.water} / {WATER_GOAL} cups</span></div><div style={{ display: "flex", gap: 6 }}>{[...Array(WATER_GOAL)].map((_, i) => <button key={i} onClick={() => setWater(i + 1 === today.water ? i : i + 1)} style={{ flex: 1, height: 30, borderRadius: 8, border: "none", cursor: "pointer", background: i < today.water ? C.blue : "rgba(63,115,144,0.12)", transition: ".2s" }} />)}</div></div>

      {/* calories */}
      <div style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 15, padding: "14px 16px", marginBottom: 22 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 14.5, fontWeight: 600, color: C.ink }}>Calories</span>
          <span style={{ fontSize: 13, fontWeight: 700, color: viewedCal != null ? C.clay : "rgba(34,45,36,0.5)" }}>{viewedCal != null ? `${viewedCal} kcal` : "Not logged"}</span>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <input value={calInput} onChange={(e) => setCalInput(e.target.value)} inputMode="numeric" placeholder={viewedCal != null ? "Update kcal" : "kcal eaten"} style={{ flex: 1, padding: "11px 14px", borderRadius: 11, border: `1px solid ${C.line}`, background: C.bg, fontSize: 15, color: C.ink, outline: "none" }} />
          <button onClick={logCal} style={{ padding: "0 18px", borderRadius: 11, border: "none", background: C.clay, color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Log</button>
        </div>
        {viewedCal != null && <button onClick={clearCal} style={{ marginTop: 8, fontSize: 12, fontWeight: 600, color: "rgba(34,45,36,0.5)", background: "none", border: "none", padding: 0, cursor: "pointer" }}>Clear this day</button>}
      </div>

      {/* ===== EVENING ===== */}
      <SectionTitle>Evening</SectionTitle>
      {settings.enabled["minoxidil-pm"] !== false && (
        <div style={{ marginBottom: 12 }}><RowCard meta={ROUTINE["minoxidil-pm"]} checked={!!today.routine["minoxidil-pm"]} onClick={() => toggleRoutine("minoxidil-pm")} accent={C.green} /></div>
      )}
      <StretchCard data={STRETCH_PM} done={!!today.habits.stretchPM} onToggle={() => toggleHabit("stretchPM")} />

      {/* ===== RECAP ===== */}
      <div className="fu" style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 18, padding: "15px 17px", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}><span style={{ fontSize: 14, fontWeight: 700, color: C.ink }}>Gym this week</span><span style={{ fontSize: 12.5, fontWeight: 600, color: "rgba(34,45,36,0.55)" }}>{workoutsThisWeek} / 3–5 days · Week {weekParity(now) === 0 ? "A" : "B"}</span></div>
        <div style={{ display: "flex", gap: 6 }}>{[...Array(5)].map((_, i) => <div key={i} style={{ flex: 1, height: 8, borderRadius: 999, background: i < workoutsThisWeek ? (i < 3 ? C.green : C.moss) : "rgba(34,45,36,0.1)", transition: ".4s" }} />)}</div>
      </div>

      <div className="fu" style={{ borderRadius: 18, padding: 18, background: C.ink }}><h3 style={{ fontSize: 15, fontWeight: 600, fontFamily: "'Fraunces',serif", color: C.bg, marginBottom: 9 }}>Keeping it sustainable</h3><p style={{ fontSize: 13, lineHeight: 1.5, color: "rgba(238,241,233,0.82)" }}>Streak counts abs + the daily habits + water. Sets and reps are starting points — coming back from a break, start lighter than you think and add as it feels easy. Showing up most days is what gets you back to running.</p></div>
    </>
  );
}

function StretchCard({ data, done, onToggle }) {
  const soft = data.accent === C.blue ? "rgba(63,115,144,0.09)" : "rgba(107,143,94,0.10)";
  const ring = data.accent === C.blue ? "rgba(63,115,144,0.3)" : "rgba(107,143,94,0.32)";
  return (
    <>
      <SectionTitle>{data.label}</SectionTitle>
      <div className="fu" style={{ background: done ? soft : C.surf, border: `1px solid ${done ? ring : C.line}`, borderRadius: 18, padding: "15px 16px", marginBottom: 22 }}>
        <button onClick={onToggle} style={{ width: "100%", textAlign: "left", display: "flex", alignItems: "center", gap: 12, background: "none", border: "none", cursor: "pointer", padding: 0, marginBottom: 12 }}>
          <Check on={done} />
          <span style={{ flex: 1 }}><span style={{ display: "block", fontSize: 15.5, fontWeight: 700, color: C.ink }}>{data.label}</span><span style={{ fontSize: 12, color: "rgba(34,45,36,0.5)" }}>{data.sub}</span></span>
        </button>
        {data.ex.map((e) => <ExRow key={e.n} ex={e} accent={data.accent} />)}
      </div>
    </>
  );
}

const SectionTitle = ({ children }) => <h2 style={{ fontSize: 18, fontWeight: 600, fontFamily: "'Fraunces',serif", color: C.ink, margin: "0 0 12px", paddingLeft: 4 }}>{children}</h2>;
function RowCard({ meta, checked, onClick, accent }) {
  return (<button onClick={onClick} style={{ textAlign: "left", width: "100%", borderRadius: 15, padding: "12px 14px", display: "flex", gap: 11, alignItems: "flex-start", cursor: "pointer", background: checked ? C.greenSoft : C.surf, border: `1px solid ${checked ? "rgba(58,107,78,0.25)" : C.line}` }}><Check on={checked} /><span style={{ flex: 1, minWidth: 0 }}><span style={{ display: "flex", alignItems: "center", gap: 7, color: accent }}><Glyph type={meta.glyph} /><span style={{ fontWeight: 600, fontSize: 14.5, color: checked ? "rgba(34,45,36,0.5)" : C.ink, textDecoration: checked ? "line-through" : "none" }}>{meta.name}</span></span>{(meta.dose || meta.when) && <span style={{ display: "block", marginTop: 3, fontSize: 12.5, fontWeight: 600, color: accent }}>{[meta.dose, meta.when].filter(Boolean).join(" · ")}</span>}{meta.note && <span style={{ display: "block", marginTop: 3, fontSize: 12, lineHeight: 1.4, color: "rgba(34,45,36,0.55)" }}>{meta.note}</span>}</span></button>);
}

// =========================== TRAIN ===========================
function Train({ now, settings, today, logWorkout }) {
  const [open, setOpen] = useState(null);
  const logged = today.workouts || [];
  const parity = weekParity(now);
  const weekDays = [...Array(7)].map((_, i) => { const tok = settings.schedule[i] || "rest"; const res = tok === "legs" ? (parity === 0 ? "legs1" : "legs2") : tok; return { i, l: ["S", "M", "T", "W", "T", "F", "S"][i], tok, res, today: i === now.getDay() }; });

  return (
    <>
      <header className="fu" style={{ paddingTop: 40, paddingBottom: 14 }}>
        <h1 style={{ fontFamily: "'Fraunces',serif", fontSize: 27, fontWeight: 600, color: C.ink }}>Train</h1>
        <p style={{ fontSize: 13, color: "rgba(34,45,36,0.55)", marginTop: 4 }}>This week is <b style={{ color: C.green }}>Week {parity === 0 ? "A" : "B"}</b> — legs run {parity === 0 ? "Workout 1" : "Workout 2"}.</p>
      </header>

      {/* week schedule */}
      <div className="fu" style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 18, padding: "14px 12px", marginBottom: 20 }}>
        <p style={{ fontSize: 11.5, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "rgba(34,45,36,0.4)", margin: "0 0 10px 4px" }}>This week</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {weekDays.map((d) => { const w = WBYID[d.res]; return (
            <div key={d.i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 8px", borderRadius: 10, background: d.today ? C.greenSoft : "transparent" }}>
              <span style={{ width: 26, fontSize: 12.5, fontWeight: 700, color: d.today ? C.green : "rgba(34,45,36,0.55)" }}>{["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][d.i]}</span>
              <span style={{ width: 7, height: 7, borderRadius: 999, background: w ? w.accent : "rgba(34,45,36,0.18)" }} />
              <span style={{ flex: 1, fontSize: 13.5, fontWeight: w ? 600 : 500, color: w ? C.ink : "rgba(34,45,36,0.45)" }}>{w ? w.name : "Rest"}</span>
              {d.today && <span style={{ fontSize: 10.5, fontWeight: 700, color: C.green, textTransform: "uppercase", letterSpacing: ".04em" }}>Today</span>}
            </div>); })}
        </div>
        <p style={{ fontSize: 11, color: "rgba(34,45,36,0.4)", margin: "10px 0 0 4px" }}>Edit which day is which on the Plan tab.</p>
      </div>

      <SectionTitle>All sessions</SectionTitle>
      {WORKOUTS.map((w) => { const isOpen = open === w.id; const done = logged.includes(w.id); return (
        <div key={w.id} className="fu" style={{ background: C.surf, border: `1px solid ${done ? "rgba(58,107,78,0.3)" : C.line}`, borderRadius: 18, marginBottom: 11, overflow: "hidden" }}>
          <button onClick={() => setOpen(isOpen ? null : w.id)} style={{ width: "100%", textAlign: "left", display: "flex", alignItems: "center", gap: 12, padding: "15px 16px", background: "none", border: "none", cursor: "pointer" }}>
            <span style={{ width: 10, height: 10, borderRadius: 999, background: w.accent, flexShrink: 0 }} />
            <span style={{ flex: 1 }}><span style={{ display: "block", fontSize: 16, fontWeight: 700, color: C.ink }}>{w.name}</span><span style={{ fontSize: 11.5, fontWeight: 600, textTransform: "uppercase", letterSpacing: ".05em", color: w.accent }}>{w.tag}{w.note ? ` · ${w.note}` : ""}</span></span>
            {done && <span style={{ fontSize: 11.5, fontWeight: 700, color: C.green, background: C.greenSoft, padding: "3px 9px", borderRadius: 999 }}>Done ✓</span>}
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(34,45,36,0.4)" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ transform: isOpen ? "rotate(180deg)" : "none", transition: ".25s" }}><path d="m6 9 6 6 6-6" /></svg>
          </button>
          {isOpen && (<div style={{ padding: "0 16px 16px" }}>{w.blocks.map((b) => (<div key={b.h} style={{ marginTop: 12 }}><p style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: w.accent, marginBottom: 4 }}>{b.h}</p>{b.ex.map((e) => <ExRow key={e.n} ex={e} accent={w.accent} />)}</div>))}<button onClick={() => logWorkout(w.id)} style={{ width: "100%", marginTop: 16, padding: 12, borderRadius: 12, border: "none", cursor: "pointer", fontSize: 14, fontWeight: 700, background: done ? "rgba(34,45,36,0.08)" : w.accent, color: done ? C.ink : "#fff" }}>{done ? "Undo log" : "Log this session"}</button></div>)}
        </div>); })}

      <h2 style={{ fontSize: 18, fontWeight: 600, fontFamily: "'Fraunces',serif", color: C.ink, margin: "22px 0 8px", paddingLeft: 4 }}>Abs — daily rotation</h2>
      <p style={{ fontSize: 12.5, color: "rgba(34,45,36,0.5)", marginBottom: 12, paddingLeft: 4 }}>One circuit a day, rotating. Today is <b style={{ color: C.clay }}>{AB_CIRCUITS[absIndex(now)].h}</b>.</p>
      {AB_CIRCUITS.map((c, i) => (<div key={c.h} className="fu" style={{ background: C.surf, border: `1px solid ${i === absIndex(now) ? "rgba(194,107,63,0.35)" : C.line}`, borderRadius: 16, padding: "13px 16px", marginBottom: 9 }}><p style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: C.clay, marginBottom: 4 }}>{c.h}{i === absIndex(now) ? " · today" : ""}</p>{c.ex.map((e) => <ExRow key={e.n} ex={e} accent={C.clay} />)}</div>))}
      <div style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 16, padding: "13px 16px" }}><p style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: C.clay, marginBottom: 4 }}>Finisher · every day</p><ExRow ex={PLANK} accent={C.clay} /></div>
    </>
  );
}

// =========================== PROGRESS ===========================
function Progress({ now, settings, weights, saveWeights, calories, days, streak, dayComplete }) {
  const [input, setInput] = useState("");
  const addWeight = () => { const lbs = parseFloat(input); if (!lbs || lbs < 50 || lbs > 600) return; const tk = keyOf(now); saveWeights([...weights.filter((w) => w.date !== tk), { date: tk, lbs }].sort((a, b) => a.date.localeCompare(b.date))); setInput(""); };
  const series = useMemo(() => [{ date: "start", lbs: settings.startWeight }, ...weights], [weights, settings.startWeight]);
  const latest = weights.length ? weights[weights.length - 1].lbs : settings.startWeight;
  const change = +(latest - settings.startWeight).toFixed(1);
  const last30 = useMemo(() => { let c = 0; for (let i = 0; i < 30; i++) if (dayComplete(addDays(now, -i))) c++; return c; }, [days, now, dayComplete]);
  const wk = useMemo(() => { let c = 0; const sun = addDays(now, -now.getDay()); for (let i = 0; i < 7; i++) if (days[keyOf(addDays(sun, i))]?.workouts?.length) c++; return c; }, [days, now]);
  const W = 400, H = 130, pad = 8; const vals = series.map((s) => s.lbs); const min = Math.min(...vals) - 2, max = Math.max(...vals) + 2;
  const x = (i) => pad + (i / Math.max(1, series.length - 1)) * (W - pad * 2); const y = (v) => H - pad - ((v - min) / Math.max(1, max - min)) * (H - pad * 2);
  const path = series.map((s, i) => `${i === 0 ? "M" : "L"}${x(i).toFixed(1)},${y(s.lbs).toFixed(1)}`).join(" ");

  // calorie chart — date-spaced x-axis so unlogged days show as proportional gaps; straight segments interpolate between entries
  const calSorted = useMemo(() => [...calories].sort((a, b) => a.date.localeCompare(b.date)), [calories]);
  const calDnums = useMemo(() => calSorted.map((c) => { const [yy, mm, dd] = c.date.split("-").map(Number); return dnum(new Date(yy, mm - 1, dd)); }), [calSorted]);
  const calVals = calSorted.map((c) => c.kcal);
  const calMin = calVals.length ? Math.max(0, Math.min(...calVals) - 200) : 0;
  const calMax = calVals.length ? Math.max(...calVals) + 200 : 1;
  const calSpan = Math.max(1, (calDnums[calDnums.length - 1] || 0) - (calDnums[0] || 0));
  const calX = (i) => calSorted.length <= 1 ? W / 2 : pad + ((calDnums[i] - calDnums[0]) / calSpan) * (W - pad * 2);
  const calY = (v) => H - pad - ((v - calMin) / Math.max(1, calMax - calMin)) * (H - pad * 2);
  const calPath = calSorted.map((c, i) => `${i === 0 ? "M" : "L"}${calX(i).toFixed(1)},${calY(c.kcal).toFixed(1)}`).join(" ");
  const calLatest = calSorted.length ? calSorted[calSorted.length - 1].kcal : null;
  const calAvg = calVals.length ? Math.round(calVals.reduce((a, b) => a + b, 0) / calVals.length) : null;
  return (
    <>
      <header className="fu" style={{ paddingTop: 40, paddingBottom: 16 }}><h1 style={{ fontFamily: "'Fraunces',serif", fontSize: 27, fontWeight: 600, color: C.ink }}>Progress</h1><p style={{ fontSize: 13, color: "rgba(34,45,36,0.55)", marginTop: 4 }}>The scale is one signal. Strength, energy, and showing up matter just as much.</p></header>
      <div className="fu" style={{ display: "flex", gap: 10, marginBottom: 20 }}><Stat icon={<Flame s={20} />} value={streak} label="day streak" big /><Stat value={wk} label="workouts / wk" /><Stat value={`${last30}`} label="full days / 30" /></div>
      <div className="fu" style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 18, padding: "18px 16px", marginBottom: 18, animationDelay: "50ms" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}><h3 style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>Weight</h3><span style={{ fontSize: 13, fontWeight: 700, color: change < 0 ? C.green : "rgba(34,45,36,0.5)" }}>{latest} lb{change !== 0 ? `  ·  ${change > 0 ? "+" : ""}${change} from start` : ""}</span></div>
        <p style={{ fontSize: 11.5, color: "rgba(34,45,36,0.45)", marginBottom: 12 }}>Started at {settings.startWeight} lb. Weigh in weekly — daily bounces around.</p>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto" }}><path d={path} fill="none" stroke={C.green} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />{series.map((s, i) => <circle key={i} cx={x(i)} cy={y(s.lbs)} r={i === series.length - 1 ? 4 : 2.5} fill={i === series.length - 1 ? C.clay : C.green} />)}</svg>
        <div style={{ display: "flex", gap: 8, marginTop: 12 }}><input value={input} onChange={(e) => setInput(e.target.value)} inputMode="decimal" placeholder="Today's weight" style={{ flex: 1, padding: "11px 14px", borderRadius: 11, border: `1px solid ${C.line}`, background: C.bg, fontSize: 15, color: C.ink, outline: "none" }} /><button onClick={addWeight} style={{ padding: "0 18px", borderRadius: 11, border: "none", background: C.green, color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>Log</button></div>
      </div>
      <div className="fu" style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 18, padding: "18px 16px", marginBottom: 18, animationDelay: "75ms" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4 }}><h3 style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>Calories</h3><span style={{ fontSize: 13, fontWeight: 700, color: calLatest != null ? C.clay : "rgba(34,45,36,0.5)" }}>{calLatest != null ? `${calLatest} kcal · last log${calAvg != null && calSorted.length > 1 ? `  ·  avg ${calAvg}` : ""}` : "No logs yet"}</span></div>
        <p style={{ fontSize: 11.5, color: "rgba(34,45,36,0.45)", marginBottom: 12 }}>Days you skip get drawn as straight-line interpolation between adjacent logs — gaps show real time elapsed.</p>
        {calSorted.length === 0 ? (
          <p style={{ fontSize: 12.5, color: "rgba(34,45,36,0.45)", padding: "26px 0", textAlign: "center", lineHeight: 1.5 }}>Log a value from the Today tab and it'll appear here.</p>
        ) : (
          <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto" }}>
            <path d={calPath} fill="none" stroke={C.clay} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
            {calSorted.map((c, i) => <circle key={c.date} cx={calX(i)} cy={calY(c.kcal)} r={i === calSorted.length - 1 ? 4 : 2.8} fill={i === calSorted.length - 1 ? C.ink : C.clay} />)}
          </svg>
        )}
      </div>
      <div className="fu" style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 18, padding: "18px 16px", animationDelay: "100ms" }}>
        <h3 style={{ fontSize: 15, fontWeight: 700, color: C.ink, marginBottom: 12 }}>Recent training</h3>
        {(() => { const rows = []; for (let i = 0; i < 14 && rows.length < 8; i++) { const d = addDays(now, -i); const r = days[keyOf(d)]; if (r?.workouts?.length) rows.push({ d, names: r.workouts.map((id) => WBYID[id]?.name || id), i }); } if (!rows.length) return <p style={{ fontSize: 13, color: "rgba(34,45,36,0.45)" }}>No sessions logged yet. Knock one out and it'll show here.</p>; return rows.map((row, k) => (<div key={k} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderBottom: k < rows.length - 1 ? `1px solid ${C.line}` : "none" }}><span style={{ fontSize: 13.5, fontWeight: 600, color: C.ink }}>{row.names.join(" + ")}</span><span style={{ fontSize: 12.5, color: "rgba(34,45,36,0.5)" }}>{row.i === 0 ? "Today" : row.d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })}</span></div>)); })()}
      </div>
    </>
  );
}
const Stat = ({ icon, value, label, big }) => (<div style={{ flex: 1, background: C.surf, border: `1px solid ${C.line}`, borderRadius: 16, padding: "16px 8px", textAlign: "center" }}><div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 4, color: big ? C.clay : C.ink, fontSize: 25, fontWeight: 700, fontFamily: "'Fraunces',serif" }}>{icon}{value}</div><div style={{ fontSize: 10.5, fontWeight: 600, color: "rgba(34,45,36,0.5)", marginTop: 4, textTransform: "uppercase", letterSpacing: ".02em" }}>{label}</div></div>);

// =========================== PLAN ===========================
function Plan({ now, settings, saveSettings }) {
  const set = (patch) => saveSettings({ ...settings, ...patch });
  const toggleNiz = (i) => { const has = settings.nizoralDays.includes(i); set({ nizoralDays: has ? settings.nizoralDays.filter((x) => x !== i) : [...settings.nizoralDays, i].sort() }); };
  const toggleItem = (id) => set({ enabled: { ...settings.enabled, [id]: settings.enabled[id] === false } });
  const cycleDay = (i) => { const cur = settings.schedule[i] || "rest"; const idx = CYCLE.indexOf(cur); const next = CYCLE[(idx + 1) % CYCLE.length]; set({ schedule: { ...settings.schedule, [i]: next } }); };
  const setSupply = (id, patch) => set({ supplies: { ...settings.supplies, [id]: { ...settings.supplies[id], ...patch } } });
  const daysLeft = (s) => { const [y, m, d] = s.start.split("-").map(Number); return Math.ceil((addDays(new Date(y, m - 1, d), s.weeks * 7) - now) / dayMs); };
  const goals = ["Lose weight and get back in shape", "Eat better — and help my blood pressure", "Feel stronger and more like myself again", "Get back to running, which I used to love"];
  const approach = ["Gym 3–5 days (2+ strength, 1 endurance + cardio)", "Abs daily · stretch morning and night", "Calorie deficit, high protein", "Salad with every meal, lots of water", "Stay away from sugar and energy drinks"];
  const colorFor = (tok) => tok === "rest" ? "rgba(34,45,36,0.18)" : tok === "cardio" ? C.clay : tok === "full" ? C.blue : C.green;
  return (
    <>
      <header className="fu" style={{ paddingTop: 40, paddingBottom: 16 }}><div style={{ display: "flex", alignItems: "center", gap: 8 }}><Frog s={22} /><h1 style={{ fontFamily: "'Fraunces',serif", fontSize: 27, fontWeight: 600, color: C.ink }}>The Plan</h1></div></header>

      <Panel title="Why I'm doing this">{goals.map((g, i) => <div key={i} style={{ display: "flex", gap: 10, padding: "8px 0", borderBottom: i < goals.length - 1 ? `1px solid ${C.line}` : "none" }}><span style={{ color: C.green, fontWeight: 700 }}>{i + 1}</span><span style={{ fontSize: 14, color: C.ink, lineHeight: 1.4 }}>{g}</span></div>)}</Panel>

      <Panel title="Starting point" sub={'Day one. The "before," not the verdict.'}><div style={{ display: "flex", gap: 10 }}><Mini label="Weight" value="207 lb" /><Mini label="Body fat" value="~30%" /><Mini label="Goal" value="Run again" /></div></Panel>

      <Panel title="Weekly schedule" sub={'Tap a day to cycle Push → Pull → Legs → Cardio → Whole Body → Rest. "Legs" auto-alternates Workout 1 (Week A) / Workout 2 (Week B).'}>
        {[1, 2, 3, 4, 5, 6, 0].map((i) => { const tok = settings.schedule[i] || "rest"; return (
          <button key={i} onClick={() => cycleDay(i)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 11, padding: "10px 4px", borderBottom: `1px solid ${C.line}`, background: "none", border: "none", borderBottomStyle: "solid", cursor: "pointer", textAlign: "left" }}>
            <span style={{ width: 34, fontSize: 13, fontWeight: 700, color: "rgba(34,45,36,0.6)" }}>{["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"][i]}</span>
            <span style={{ width: 8, height: 8, borderRadius: 999, background: colorFor(tok) }} />
            <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: tok === "rest" ? "rgba(34,45,36,0.45)" : C.ink }}>{SESSIONS[tok]}</span>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(34,45,36,0.35)" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6" /></svg>
          </button>); })}
      </Panel>

      <Panel title="The approach">{approach.map((r, i) => <div key={i} style={{ display: "flex", gap: 9, padding: "7px 0" }}><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke={C.green} strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round" style={{ flexShrink: 0, marginTop: 2 }}><path d="m5 12 5 5L20 6" /></svg><span style={{ fontSize: 13.5, color: C.ink, lineHeight: 1.4 }}>{r}</span></div>)}</Panel>

      <Panel title="Foods I know I can eat" sub="Your safe list. No shame — we build from here."><div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>{FOODS.map((f) => <span key={f} style={{ fontSize: 12.5, fontWeight: 500, color: C.ink, background: C.bg, border: `1px solid ${C.line}`, borderRadius: 999, padding: "6px 12px" }}>{f}</span>)}</div></Panel>

      <Panel title="Protein" sub="You've got protein powder — that's the whole game made easy. Lead with it, then these fit your taste.">
        <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 16 }}>{PROTEIN_NOW.map((p) => <span key={p} style={{ fontSize: 12.5, fontWeight: 600, color: C.green, background: C.greenSoft, borderRadius: 999, padding: "6px 12px" }}>{p}</span>)}</div>
        <p style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: C.moss, marginBottom: 10 }}>Easy adds</p>
        {PROTEIN_EASY.map(([n, d]) => <div key={n} style={{ padding: "9px 0", borderBottom: `1px solid ${C.line}` }}><p style={{ fontSize: 14, fontWeight: 600, color: C.ink }}>{n}</p><p style={{ fontSize: 12.5, color: "rgba(34,45,36,0.6)", lineHeight: 1.45, marginTop: 2 }}>{d}</p></div>)}
        <p style={{ fontSize: 12, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".05em", color: C.moss, margin: "16px 0 10px" }}>When you're ready to branch out</p>
        {PROTEIN_LATER.map(([n, d]) => <div key={n} style={{ padding: "9px 0", borderBottom: `1px solid ${C.line}` }}><p style={{ fontSize: 14, fontWeight: 600, color: C.ink }}>{n}</p><p style={{ fontSize: 12.5, color: "rgba(34,45,36,0.6)", lineHeight: 1.45, marginTop: 2 }}>{d}</p></div>)}
      </Panel>

      <Panel title="Name"><input value={settings.name} onChange={(e) => set({ name: e.target.value })} style={{ width: "100%", padding: "11px 14px", borderRadius: 12, border: `1px solid ${C.line}`, background: C.bg, fontSize: 15, color: C.ink, outline: "none" }} /></Panel>

      <Panel title="Nizoral days" sub="Tap the days you use the anti-dandruff shampoo (2–3× a week)."><div style={{ display: "flex", gap: 6 }}>{["S", "M", "T", "W", "T", "F", "S"].map((l, i) => { const on = settings.nizoralDays.includes(i); return <button key={i} onClick={() => toggleNiz(i)} style={{ flex: 1, padding: "11px 0", borderRadius: 12, border: `1px solid ${on ? C.green : C.line}`, background: on ? C.green : C.bg, color: on ? "#fff" : "rgba(34,45,36,0.6)", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>{l}</button>; })}</div></Panel>

      <Panel title="What's in your routine" sub="Switch off anything you stop using.">{ROUTINE_IDS.map((id) => { const on = settings.enabled[id] !== false; const nm = id === "shampoo" ? "Shampoo (in shower)" : id === "minoxidil-am" ? "Minoxidil — morning" : id === "minoxidil-pm" ? "Minoxidil — evening" : ROUTINE[id].name; return <div key={id} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.line}` }}><span style={{ fontSize: 14, fontWeight: 500, color: on ? C.ink : "rgba(34,45,36,0.4)" }}>{nm}</span><button onClick={() => toggleItem(id)} style={{ width: 44, height: 26, borderRadius: 999, border: "none", background: on ? C.green : "rgba(34,45,36,0.18)", position: "relative", cursor: "pointer", transition: ".25s" }}><span style={{ position: "absolute", top: 3, left: on ? 21 : 3, width: 20, height: 20, borderRadius: 999, background: "#fff", transition: ".25s" }} /></button></div>; })}</Panel>

      <Panel title="Supplies & reorder" sub={'Rough estimates so nothing runs out. Adjust the weeks, or tap "Restocked" when a new one arrives.'}>{Object.entries(settings.supplies).map(([id, s]) => { const left = daysLeft(s); const frac = Math.max(0, Math.min(1, left / (s.weeks * 7))); const low = left <= 10; return (<div key={id} style={{ padding: "12px 0", borderBottom: `1px solid ${C.line}` }}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}><span style={{ fontSize: 14, fontWeight: 600, color: C.ink }}>{s.name}</span><span style={{ fontSize: 12.5, fontWeight: 700, color: low ? C.clay : C.green }}>{left > 0 ? `${left} days left` : "Reorder now"}</span></div><div style={{ height: 6, borderRadius: 999, background: "rgba(34,45,36,0.08)", overflow: "hidden", marginBottom: 9 }}><div style={{ width: `${frac * 100}%`, height: "100%", background: low ? C.clay : C.green, borderRadius: 999, transition: ".5s" }} /></div><div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: "rgba(34,45,36,0.55)" }}><span>Lasts</span><button onClick={() => setSupply(id, { weeks: Math.max(1, s.weeks - 1) })} style={stepBtn}>−</button><span style={{ fontWeight: 700, color: C.ink, minWidth: 52, textAlign: "center" }}>{s.weeks} wks</span><button onClick={() => setSupply(id, { weeks: s.weeks + 1 })} style={stepBtn}>+</button><button onClick={() => setSupply(id, { start: keyOf(now) })} style={{ marginLeft: "auto", fontSize: 12, fontWeight: 700, color: C.green, background: C.greenSoft, border: "none", borderRadius: 999, padding: "5px 12px", cursor: "pointer" }}>Restocked</button></div></div>); })}</Panel>

      <div style={{ background: C.ink, borderRadius: 18, padding: 18, marginTop: 4 }}><h3 style={{ fontSize: 15, fontWeight: 600, fontFamily: "'Fraunces',serif", color: C.bg, marginBottom: 9 }}>Worth doing first</h3><p style={{ fontSize: 13, lineHeight: 1.55, color: "rgba(238,241,233,0.82)" }}>Since you mentioned blood pressure, check in with a doctor before the sprints, sled drives, and box jumps — they can also point you toward eating tweaks (a lot of your go-to foods are salty) that actually move your numbers. Early on, weight can drop fast then stall for weeks while you're still making progress. That stall is normal. Keep showing up.</p><p style={{ fontSize: 11, lineHeight: 1.5, color: "rgba(238,241,233,0.45)", marginTop: 10 }}>This app is a personal organizer, not medical or nutrition advice.</p></div>
    </>
  );
}
const stepBtn = { width: 26, height: 26, borderRadius: 8, border: `1px solid ${C.line}`, background: C.bg, color: C.ink, fontSize: 16, fontWeight: 700, cursor: "pointer", lineHeight: 1 };
const Panel = ({ title, sub, children }) => (<section className="fu" style={{ background: C.surf, border: `1px solid ${C.line}`, borderRadius: 18, padding: 18, marginBottom: 14 }}><h3 style={{ fontSize: 15, fontWeight: 700, color: C.ink }}>{title}</h3>{sub ? <p style={{ fontSize: 12, color: "rgba(34,45,36,0.5)", margin: "4px 0 14px", lineHeight: 1.45 }}>{sub}</p> : <div style={{ height: 12 }} />}{children}</section>);
const Mini = ({ label, value }) => (<div style={{ flex: 1, background: C.bg, borderRadius: 13, padding: "13px 10px", textAlign: "center" }}><div style={{ fontSize: 16, fontWeight: 700, color: C.ink, fontFamily: "'Fraunces',serif" }}>{value}</div><div style={{ fontSize: 10.5, fontWeight: 600, color: "rgba(34,45,36,0.5)", marginTop: 3, textTransform: "uppercase", letterSpacing: ".03em" }}>{label}</div></div>);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
